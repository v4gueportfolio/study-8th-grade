<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shafir's Study Dash</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; max-width: 600px; margin: 40px auto; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn { background: #7289da; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #5b73c7; }
        input[type="text"] { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #2a2a2a; color: white; }
        .option { display: block; margin: 10px 0; cursor: pointer; }
        .feedback { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🧠 Study Station</h1>
    <div class="card" id="quiz-container">
        <h3 id="question-text">Loading question...</h3>
        <div id="answers-container"></div>
        <button class="btn" id="submit-btn" onclick="checkAnswer()">Submit</button>
        <p class="feedback" id="feedback-text"></p>
    </div>

    <script>
        const quizData = [
            { type: "mcq", q: "What language does Roblox use?", options: ["Python", "Luau", "C++", "Java"], correct: "Luau" },
            { type: "sa", q: "What is 15 multiplied by 4?", correct: "60" }
        ];

        let currentIdx = 0;

        function loadQuestion() {
            const current = quizData[currentIdx];
            document.getElementById("question-text").innerText = current.q;
            const container = document.getElementById("answers-container");
            container.innerHTML = "";
            document.getElementById("feedback-text").innerText = "";

            if (current.type === "mcq") {
                current.options.forEach(opt => {
                    container.innerHTML += `<label class="option"><input type="radio" name="quiz-opt" value="${opt}"> ${opt}</label>`;
                });
                document.getElementById("submit-btn").style.display = "block";
            } else if (current.type === "sa") {
                container.innerHTML = `<input type="text" id="sa-input" placeholder="Type your answer here...">`;
                document.getElementById("submit-btn").style.display = "block";
            }
        }

        function checkAnswer() {
            const current = quizData[currentIdx];
            let userAnswer = "";
            
            if (current.type === "mcq") {
                const selected = document.querySelector('input[name="quiz-opt"]:checked');
                if (!selected) return alert("Pick an option, vro!");
                userAnswer = selected.value;
            } else {
                userAnswer = document.getElementById("sa-input").value.trim();
            }

            const feedback = document.getElementById("feedback-text");
            if (userAnswer.toLowerCase() === current.correct.toLowerCase()) {
                feedback.innerText = "✅ Correct! Smart choice.";
                feedback.style.color = "#4caf50";
            } else {
                feedback.innerText = `❌ Wrong. Correct answer: ${current.correct}`;
                feedback.style.color = "#f44336";
            }

            setTimeout(() => {
                currentIdx = (currentIdx + 1) % quizData.length;
                loadQuestion();
            }, 2000);
        }

        loadQuestion();
    </script>
</body>
</html>
