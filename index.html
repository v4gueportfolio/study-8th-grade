<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সারাংশ মূল্যায়ন অ্যাপ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
        }
        h1, h2 {
            color: #2c3e50;
        }
        select, textarea, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        textarea {
            height: 150px;
            resize: vertical;
        }
        button {
            background-color: #2ecc71;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #27ae60;
        }
        .box {
            background-color: #ecf0f1;
            padding: 15px;
            border-left: 5px solid #3498db;
            margin-bottom: 20px;
            white-space: pre-line;
            border-radius: 0 4px 4px 0;
        }
        .result-box {
            background-color: #e8f8f5;
            border-left: 5px solid #2ecc71;
            padding: 15px;
            margin-top: 20px;
            display: none;
            border-radius: 0 4px 4px 0;
        }
        .score {
            font-size: 24px;
            font-weight: bold;
            color: #27ae60;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>সারাংশ মূল্যায়ন (Class 8 NCTB)</h1>
    
    <label for="storySelect"><strong>অনুচ্ছেদটি নির্বাচন করো:</strong></label>
    <select id="storySelect" onchange="loadStory()">
        <option value="story_2_1">২.১ কিসের থেকে এসেছে আমাদের বাংলা ভাষা?</option>
        <option value="story_2_2">২.২ আনন্দ প্রকাশ জীবনীশক্তির প্রবলতারই প্রকাশ</option>
        <option value="story_2_3">২.৩ বাঙালি যেদিন ঐক্যবদ্ধ হয়ে বলতে পারবে</option>
        <option value="story_2_4">২.৪ একজন মানুষ ভালো কি মন্দ আমরা তা বুঝতে পারি</option>
        <option value="story_2_5">২.৫ সূর্যের আলোতে রাতের অন্ধকার কেটে যায়</option>
    </select>

    <h2>মূল পাঠ:</h2>
    <div id="originalText" class="box"></div>

    <label for="userInput"><strong>তোমার লেখা সারাংশ এখানে দাও:</strong></label>
    <textarea id="userInput" placeholder="এখানে তোমার সারাংশটি লেখো বা পেস্ট করো..."></textarea>

    <button onclick="evaluateSummary()">মূল্যায়ন করো</button>

    <div id="result" class="result-box">
        <h2>মূল্যায়ন ফলাফল</h2>
        <p><strong>প্রাপ্ত স্কোর:</strong> <span id="scoreValue" class="score">০</span> / ১০০</p>
        <div id="feedback" style="white-space: pre-line;"></div>
    </div>
</div>

<script>
    // Exact official texts from image_1a0f5c.png and image_1a0f7d.png
    const summaryData = {
        story_2_1: {
            text: "কোথা থেকে এসেছে আমাদের বাংলা ভাষা? ভাষা কি জন্ম নেয় মানুষের মতো? বা যেমন বীজ থেকে গাছ জন্মে তেমনভাবে জন্ম নেয় ভাষা? না, ভাষা মানুষ বা তরুর মতো জন্ম নেয় না। বাংলা ভাষাও মানুষ বা তরুর মতো জন্ম নেয়নি, কোনো কল্পিত স্বর্গ থেকেও আসেনি। এখন আমরা যে বাংলা ভাষা বলি এক হাজার বছর আগে তা ঠিক এমন ছিল না। সে-ভাষায় এ-দেশের মানুষ কথা বলত, গান গাইত, কবিতা বানাত। মানুষের মুখে মুখে বদলে যায় ভাষার ধ্বনি। রূপ বদলে যায় শব্দের, বদল ঘটে অর্থের। অনেক দিন কেটে গেলে মনে হয় ভাষাটি একটি নতুন ভাষা হয়ে উঠেছে। আর সে-ভাষার বদল ঘটেই জন্ম হয়েছে বাংলা ভাষার।",
            summary: "ভাষার ধর্মই হচ্ছে বদলে যাওয়া। মানুষের মুখে মুখে বদলে যায় ভাষার ধ্বনি। শব্দেরও বদল ঘটে এবং সে সঙ্গে শব্দের অর্থেরও। হাজার বছরের পরিবর্তনের ধারাবাহিকতায় এমনিভাবেই আমাদের বাংলা ভাষার জন্ম হয়েছে।"
        },
        story_2_2: {
            text: "আনন্দ প্রকাশ জীবনীশক্তির প্রবলতারই প্রকাশ। আমরা আনন্দকে ইন্দ্রিয়ের মাধ্যমে রূপ-রস-শব্দ-স্পর্শ গন্ধ ইত্যাদির সাহায্যে উপলব্ধি করি। মানুষ যখন আনন্দ পায় তখন সে তার মনকে প্রকাশ করতে চায় – নানা রূপে। তাই সৃষ্টি হলো চিত্রশিল্পী, নৃত্যশিল্পী, সংগীতশিল্পী, কবি, সাহিত্যিক। পুরাকালের গুহামানুষ থেকে শুরু করে বর্তমান যুগ পর্যন্ত মানুষ নিজের পাওয়া আনন্দকে সুন্দরের অন্য মানুষের মধ্যে বিস্তার করতে চেয়েছে। তাই সৃষ্টি হয়েছে নানান আঙ্গিকের শিল্পকলা।",
            summary: "মানুষের জীবনীশক্তির প্রকাশ ঘটে আনন্দে। তার সমস্ত ইন্দ্রিয় দিয়ে আনন্দকে সে উপলব্ধি করে। সেই আনন্দানুভূতি সবার কাছে জানাতে চায়। তাই ছবি, গান, কবিতা, নাচ, ভাস্কর্য ইত্যাদি শিল্পকলার মাধ্যমে মানুষ তার আনন্দকে প্রকাশ করে। এই আনন্দ ও সুন্দর বোধ মানুষের মনকে তৃপ্ত করে।"
        },
        story_2_3: {
            text: "বাঙালি যেদিন ঐক্যবদ্ধ হয়ে বলতে পারবে – ‘বাঙালির বাংলা’ সেদিন তারা অসাধ্য সাধন করবে। বাঙালির মতো জ্ঞান-শক্তি ও প্রেম-শক্তি (ব্রেন সেন্টার ও হার্ট সেন্টার) এশিয়ায় কেন, বুঝি পৃথিবীতে কোনোজাতির নেই। কিন্তু কর্ম-শক্তি একেবারে নেই বলেই তাদের এই দিব্যশক্তি তমসাবৃত হয়ে আছে। তাদের কর্ম-বিমুখতা, জড়তা, মৃত্যুভয়, আলস্য, তন্দ্রা, নিদ্রা, ব্যবসা-বাণিজ্যে অনিচ্ছার কারণ। তারা তামসিকতায় আচ্ছন্ন হয়ে চেতনা-শক্তিকে হারিয়ে ফেলেছে। এই তমস, এই তিমির, এই জড়তাই অবিদ্যা। অবিদ্যা কেবল অন্ধকার পথে ভ্রান্তির পথে নিয়ে যায়; দিব্যশক্তিকে নিস্তেজ, মৃতপ্রায় করে রাখে।",
            summary: "বাঙালি প্রেম-শক্তি ও জ্ঞান-শক্তিতে অতুলনীয়। কিন্তু আলস্য তাদের দুর্বল করে রেখেছে। কর্মবিমুখতা আর কাজের প্রতি অনিহার জন্য তারা জগতের সবকিছুর থেকে পিছিয়ে আছে। এই আলস্য ও কর্ম বিমুখতাকে উপেক্ষা করে বাঙালিকে জেগে উঠতে হবে। তবেই এই জাতি প্রকৃত অর্থে বাঙালি হবে।"
        },
        story_2_4: {
            text: "একজন মানুষ ভালো কি মন্দ আমরা তা বুঝতে পারি তার ব্যবহার দিয়ে। সে ভদ্র কি অভদ্র তাও বুঝতে পারি তার ব্যবহার দিয়ে। ব্যবহার ভালো হলে লোকে তাকে ভালো বলে। তাকে পছন্দ করে। ব্যবহার খারাপ হলে লোকে তাকে খারাপ বলে। তাকে অপছন্দ করে। তার সঙ্গে মিশতে চায় না। তার সঙ্গে কাজ করতে চায় না। তাকে কাছে রাখতে চায় না। তোমার ব্যবহার দিয়েই তোমার মনুষ্যত্বের পরিচয়।",
            summary: "সুন্দর ব্যবহারের মধ্যেই মনুষ্যত্বের পরিচয় নিহিত। মানুষের আচার আচরণ, সততা ও আদর-কদর এর মধ্য দিয়েই সুন্দর ব্যবহারের প্রকাশ ঘটে। ভালো ব্যবহার দিয়ে সহজেই অপরের ভালোবাসা পাওয়া যায়। সুন্দর স্বভাবের মধ্যেই মানুষের সৌন্দর্য ফুটে ওঠে।"
        },
        story_2_5: {
            text: "সূর্যের আলোতে রাতের অন্ধকার কেটে যায়। শিক্ষার আলো আমাদের অজ্ঞতার অন্ধকার দূর করে। আমাদের দৃষ্টিতে চারপাশের জগৎ আরও সুন্দর হয়ে ওঠে। আমরা জীবনের নতুন অর্থ খুঁজে পাই; শিক্ষার আলো পেয়ে আমাদের ভেতরের মানুষটি জেগে ওঠে। আমরা বড় হতে চাই, বড় হওয়ার জন্য চেষ্টা করি। আমরা সুন্দর করে বাঁচতে চাই, বাঁচার মতো বাঁচতে চাই। আর সুন্দর করে বাঁচতে হলে চাই জ্ঞান। এই জ্ঞানকে কাজে লাগানো চাই। শিক্ষার ফলে আমাদের ভেতর যে শক্তি লুকানো থাকে তা ধীরে ধীরে জেগে ওঠে। আমরা মানুষ হয়ে উঠি।",
            summary: "সূর্যের আলো যেমন অন্ধকার দূর করে, তেমনি শিক্ষার আলো মনের অন্ধকার দূর করে দেয়। আমাদের প্রত্যেকের ভেতরে শক্তি লুকানো থাকে। শিক্ষা এ শক্তির বিকাশে সাহায্য করে। শিক্ষার ফলে আমরা জ্ঞান ও দক্ষতা লাভ করে নিজের শক্তিকে কাজে লাগাই। যথার্থ মানুষ হয়ে উঠি।"
        }
    };

    function loadStory() {
        const selected = document.getElementById("storySelect").value;
        document.getElementById("originalText").innerText = summaryData[selected].text;
    }

    function evaluateSummary() {
        const selected = document.getElementById("storySelect").value;
        const userText = document.getElementById("userInput").value.trim();
        const officialSummary = summaryData[selected].summary;

        if (!userText) {
            alert("দয়া করে আগে কিছু লেখো!");
            return;
        }

        // Clean text arrays for evaluating keywords
        const userWords = userText.split(/\s+/);
        const officialWords = officialSummary.split(/\s+/);
        
        let matchingKeywords = 0;
        officialWords.forEach(word => {
            const cleanWord = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()‘]/g,"");
            if (cleanWord.length > 1 && userText.includes(cleanWord)) {
                matchingKeywords++;
            }
        });

        // Evaluation parameters
        const keywordMatchRatio = matchingKeywords / officialWords.length;
        let finalScore = Math.round(keywordMatchRatio * 100);

        // Adjusting score based on standard constraints
        if (userWords.length < 10) {
            finalScore = Math.max(10, finalScore - 30);
        } else if (userWords.length > officialWords.length * 2) {
            finalScore = Math.max(20, finalScore - 20);
        }

        if (finalScore > 100) finalScore = 100;
        if (finalScore < 0) finalScore = 0;

        // Feedback strings
        let feedbackMessage = "";
        if (finalScore >= 80) {
            feedbackMessage = "চমৎকার! তোমার সারাংশটি মূল ভাবের খুবই কাছাকাছি এবং যথাযথ হয়েছে।";
        } else if (finalScore >= 50) {
            feedbackMessage = "ভালো চেষ্টা! তবে মূল উত্তরের কিছু গুরুত্বপূর্ণ শব্দ বা ভাব বাদ পড়েছে। আর একটু গুছিয়ে লেখার চেষ্টা করো।";
        } else {
            feedbackMessage = "সারাংশটি আশানুরূপ হয়নি। মূল অনুচ্ছেদটি আবার ভালো করে পড়ো এবং মূল শব্দগুলো ব্যবহার করার চেষ্টা করো।";
        }

        // Display updates
        document.getElementById("scoreValue").innerText = finalScore;
        document.getElementById("feedback").innerText = feedbackMessage;
        document.getElementById("result").style.display = "block";
    }

    // Run layout execution immediately on load
    window.onload = loadStory;
</script>

</body>
</html>
